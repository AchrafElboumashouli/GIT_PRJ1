version: "3.9"

# =============================================================
# Amazon Review Sentiment Analysis — Docker Compose
# =============================================================
# Services (Spark-free, lightweight):
#   1. zookeeper  — Kafka cluster coordinator
#   2. kafka      — Message broker
#   3. mongodb    — NoSQL storage for predictions
#   4. kafka-setup — One-shot topic creation
#   5. producer   — Streams CSV reviews → Kafka
#   6. consumer   — Reads Kafka → Sentiment Analysis → MongoDB
#   7. backend    — FastAPI REST API
#   8. dashboard  — Streamlit UI
# =============================================================

networks:
  sentiment-net:
    driver: bridge

volumes:
  mongo_data:
  kafka_data:
  zookeeper_data:

services:

  # ------------------------------------------------------------
  # Zookeeper
  # ------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    networks: [sentiment-net]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ------------------------------------------------------------
  # Kafka Broker
  # ------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    networks: [sentiment-net]
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ------------------------------------------------------------
  # MongoDB
  # ------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    hostname: mongodb
    networks: [sentiment-net]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: reviews_db
    volumes:
      - mongo_data:/data/db
      - ./database/init_mongo.js:/docker-entrypoint-initdb.d/init_mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ------------------------------------------------------------
  # Kafka Topic Setup (one-shot)
  # ------------------------------------------------------------
  kafka-setup:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: kafka-setup
    networks: [sentiment-net]
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: reviews-topic
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_REPLICATION_FACTOR: 1
    command: python producer/setup_topic.py
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"

  # ------------------------------------------------------------
  # Kafka Producer
  # ------------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: producer
    networks: [sentiment-net]
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: reviews-topic
      CSV_PATH: /app/data/test_reviews.csv
      PRODUCER_DELAY: "1"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  # ------------------------------------------------------------
  # Python Consumer (Kafka → Sentiment → MongoDB)
  # ------------------------------------------------------------
  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: consumer
    networks: [sentiment-net]
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: reviews-topic
      MONGO_URI: mongodb://mongodb:27017/reviews_db
      MONGO_DATABASE: reviews_db
      CONSUMER_GROUP_ID: sentiment-consumer-group
    volumes:
      - ./logs:/app/logs
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ------------------------------------------------------------
  # FastAPI Backend
  # ------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: backend
    hostname: backend
    networks: [sentiment-net]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/reviews_db
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_DATABASE: reviews_db
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ------------------------------------------------------------
  # Streamlit Dashboard
  # ------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: dashboard
    networks: [sentiment-net]
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      API_BASE_URL: http://backend:8000
      DASHBOARD_REFRESH: "5"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
